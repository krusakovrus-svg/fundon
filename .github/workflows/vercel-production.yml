name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      catalog_sync_scope:
        description: Catalog sync scope requested by parser bot
        required: true
        default: all
        type: choice
        options:
          - all
          - football
          - hockey
          - basketball
          - martial-arts
          - ufc
      triggered_by:
        description: Trigger source
        required: false
        default: manual
        type: string

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Catalog sync - {0} - {1}', github.event.inputs.catalog_sync_scope || 'all', github.event.inputs.triggered_by || github.actor)
      || format('Deploy main - {0}', github.sha)
  }}

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Workspace guard
        run: npm run guard:workspace

      - name: Install dependencies
        run: npm ci

      - name: Sync sports catalog
        run: |
          echo "Catalog sync scope: ${CATALOG_SYNC_SCOPE}"
          echo "Triggered by: ${CATALOG_SYNC_TRIGGERED_BY}"
          npm run catalog:sync
        env:
          CATALOG_SYNC_SCOPE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.catalog_sync_scope || 'all' }}
          CATALOG_SYNC_TRIGGERED_BY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.triggered_by || github.actor }}

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build on Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: npx vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke check admin routes
        run: node scripts/check-admin-routes.mjs https://fundon.vercel.app
